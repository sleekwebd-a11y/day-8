<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Velvet 21 • Day 8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-neutral-950 text-white font-sans min-h-screen overflow-x-hidden">
  <div class="max-w-[420px] mx-auto bg-neutral-950 min-h-screen flex flex-col shadow-2xl relative">

    <!-- HEADER -->
    <header class="bg-gradient-to-br from-emerald-900 via-black to-purple-900 px-6 py-6 text-center border-b border-emerald-500/30">
      <div class="flex justify-between items-center">
        <h1 class="text-5xl font-bold tracking-tighter" style="font-family: 'Space Grotesk', sans-serif;">VELVET<span class="text-emerald-400">21</span></h1>
        <button onclick="showBankrollModal()" class="px-5 py-2 bg-neutral-900 rounded-2xl text-sm font-medium flex items-center gap-2 hover:bg-neutral-800">
          <span id="bankroll-display" class="text-emerald-400 font-bold">$2500</span>
          <span class="text-neutral-400 text-xs">EDIT</span>
        </button>
      </div>
      <p class="text-emerald-400 text-xs tracking-[3px] mt-1">DAY 8 BLACKJACK</p>
    </header>

    <!-- GAME TABLE -->
    <main class="flex-1 p-5 relative" style="background: radial-gradient(circle at center, #052e16 0%, #000000 70%);">
      <div class="mb-8">
        <p class="text-xs text-neutral-400 mb-2 text-center">DEALER <span id="dealer-total" class="font-mono"></span></p>
        <div id="dealer-hand" class="flex justify-center gap-3 min-h-[110px]"></div>
      </div>
      <div>
        <p class="text-xs text-neutral-400 mb-2 text-center">YOU <span id="player-total" class="font-mono"></span></p>
        <div id="player-hand" class="flex justify-center gap-3 min-h-[110px]"></div>
      </div>

      <div id="result-overlay" class="hidden absolute inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="text-center">
          <p id="result-text" class="text-5xl font-bold mb-8"></p>
          <button onclick="newHand()" class="px-12 py-5 bg-emerald-500 rounded-3xl text-xl font-semibold">NEXT HAND</button>
        </div>
      </div>
    </main>

    <!-- CONTROLS -->
    <div class="bg-neutral-900 border-t border-neutral-800 p-5 space-y-6">
      <!-- Perfect Pairs Side Bet -->
      <div class="flex items-center justify-between bg-neutral-800 rounded-2xl px-5 py-4">
        <div class="flex items-center gap-3">
          <span class="text-purple-400 text-2xl">💎</span>
          <div>
            <p class="font-medium">Perfect Pairs</p>
            <p class="text-xs text-neutral-400">+$25 if first two cards match</p>
          </div>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="perfect-pair" class="sr-only peer">
          <div class="w-14 h-7 bg-neutral-700 rounded-full peer peer-checked:bg-purple-500"></div>
          <div class="absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition peer-checked:translate-x-7"></div>
        </label>
      </div>

      <!-- Bet Phase -->
      <div id="bet-phase">
        <p class="text-center text-xs text-neutral-400 mb-3">PLACE YOUR BET</p>
        <div class="grid grid-cols-6 gap-2 mb-6">
          <button onclick="setBet(5)" class="chip">5</button>
          <button onclick="setBet(25)" class="chip">25</button>
          <button onclick="setBet(50)" class="chip">50</button>
          <button onclick="setBet(100)" class="chip">100</button>
          <button onclick="setBet(500)" class="chip">500</button>
          <button onclick="setBet(999999)" class="chip text-rose-400">ALL</button>
        </div>
        <button onclick="dealHand()" id="deal-btn" class="w-full py-5 bg-emerald-500 rounded-3xl text-xl font-bold">DEAL CARDS</button>
      </div>

      <!-- Action Phase -->
      <div id="action-phase" class="hidden grid grid-cols-4 gap-3">
        <button onclick="hit()" class="action-btn">HIT</button>
        <button onclick="stand()" class="action-btn">STAND</button>
        <button onclick="doubleDown()" class="action-btn">DOUBLE</button>
        <button onclick="splitHand()" class="action-btn opacity-30">SPLIT</button>
      </div>
    </div>

    <!-- Current Bet -->
    <div class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-neutral-900 text-center px-8 py-2 rounded-3xl border border-emerald-500/30">
      <span class="text-xs text-neutral-400">CURRENT BET</span><br>
      <span id="current-bet" class="text-3xl font-bold">$0</span>
    </div>

  </div>

  <!-- Bankroll Modal -->
  <div id="bankroll-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-neutral-900 rounded-3xl p-8 w-80 text-center">
      <h3 class="text-2xl font-semibold mb-6">Set Your Bankroll</h3>
      <div class="relative mb-6">
        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-3xl">$</span>
        <input id="modal-bankroll" type="number" class="w-full bg-neutral-800 text-center text-5xl font-bold py-6 rounded-2xl outline-none">
      </div>
      <button onclick="saveBankroll()" class="w-full py-5 bg-emerald-500 rounded-3xl text-lg font-semibold">SAVE BANKROLL</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
